name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      APP_NAME: my_service
      APP_VERSION: "0.1.0"
      POSTGRES_HOST: localhost
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_PORT: 5432
      POSTGRES_DB: test_db
      POOL_SIZE: 5
      MAX_OVERFLOW: 5
      POOL_TIMEOUT: 30
      POOL_RECYCLE: 1800
      LOG_LEVEL: DEBUG
      HEALTH_CHECK_TIMEOUT_SEC: 5
      # [AI]
      MISTRAL_API_KEY: ""
      MISTRAL_MODEL: mistral-small-latest
      MISTRAL_EMBED_MODEL: mistral-embed
      MISTRAL_VISION_MODEL: pixtral-12b-2409
      MISTRAL_TIMEOUT_SEC: 60
      MISTRAL_VISION_TIMEOUT_SEC: 120
      GROQ_API_KEY: ""
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_VISION_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
      GROQ_TIMEOUT_SEC: 30

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: testapikey
      QDRANT_TIMEOUT: 60
      QDRANT_MAIN_ENABLED: "false"
      QDRANT_MAIN_URL: ""
      QDRANT_MAIN_API_KEY: ""
      T1_SEARCH_MIN_SCORE: 0.85
      VECTOR_DB_COLLECTION: test
      VECTOR_DB_VECTOR_SIZE: 1024
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_TOKENS_STREAM: stream:tokens
      REDIS_TOKENS_GROUP: token_workers
      REDIS_TOKENS_WORKER: main
      REDIS_TOKENS_BATCH_SIZE: 100
      REDIS_TOKENS_POLL_INTERVAL: 60
      LANGCHAIN_TRACING_V2: false
      LANGCHAIN_API_KEY: ""
      LANGCHAIN_PROJECT: 1_Lang


    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff black
        run: poetry run black app tests

      - name: Ruff linting
        run: poetry run ruff check app tests --fix

      - name: Ruff formatting
        run: poetry run ruff format app tests

      - name: Check types with mypy
        run: poetry run mypy app

      - name: Run tests
        run: poetry run pytest --cov-report=term-missing:skip-covered --cov=app tests/
