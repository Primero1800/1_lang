services:
  service:
    restart: unless-stopped
    env_file:
      - .env
    build:
      context: ./
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app/app
    command: ["sh", "-c", "poetry run alembic upgrade head && poetry run uvicorn app.main:app --host 0.0.0.0 --reload"]
    networks:
      - my_service_network

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${POSTGRES_PORT}"
    ports:
      - "5433:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
    command: -p ${POSTGRES_PORT}
    networks:
      - my_service_network

  qdrant:
      image: qdrant/qdrant:latest
      restart: unless-stopped
      env_file:
        - .env
      ports:
        - "6333:6333"       # REST API и Web-панель управления (Dashboard)
        - "6334:6334"       # gRPC API
      volumes:
        - qdrant_data:/qdrant/storage
      networks:
        - my_service_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  my_service_network:
    name: 1_Lang
    driver: bridge
    external: True
